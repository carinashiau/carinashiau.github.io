<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ page.title }}</title>

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  <style>
    .wrapper {
      max-width: 1000px;
      margin: 0 auto;
      padding: 60px 30px;

      display: grid;
      grid-template-columns: 220px 1fr;
      grid-template-rows: auto 1fr;
      column-gap: 60px;
      row-gap: 20px;
      align-items: start;
    }

    /* TOP LEFT: NAME */
    .name {
      grid-column: 1;
      grid-row: 1;
      font-size: 26px;
      font-weight: 600;
    }

    /* TOP RIGHT: NAV */
    nav {
      grid-column: 2;
      grid-row: 1;
      justify-self: end;
    }

    nav a {
      margin-left: 15px;
      text-decoration: none;
      color: inherit;
    }

    nav a:hover {
      text-decoration: underline;
    }

    /* BOTTOM LEFT: PHOTO */
    .sidebar {
      grid-column: 1;
      grid-row: 2;
    }

    .sidebar img {
      width: 100%;
      border-radius: 6px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    /* BOTTOM RIGHT: CONTENT */
    .content {
      grid-column: 2;
      grid-row: 2;
      line-height: 1.6;
      max-width: 650px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                   Roboto, Helvetica, Arial, sans-serif;
      font-weight: 400;
      color: #333;
    }
  </style>
</head>

<body>

<div class="wrapper">

  <div class="name">
    {{ site.title }}
  </div>

  <nav>
    <a href="/">Home</a>
    <a href="/research.html">Research</a>
    <a href="/art.html">Art</a>
  </nav>

  <div class="sidebar">
    <img src="/assets/profile.jpg" alt="profile">
  </div>

  <div class="content">
    {{ content }}
  </div>

</div>

</body>
</html>
