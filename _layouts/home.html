<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ page.title }}</title>

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    .wrapper {
      max-width: 1000px;
      margin: 0 auto;
      padding: 60px 30px;

      display: grid;
      grid-template-columns: 220px 1fr;
      grid-template-rows: auto 1fr;
      column-gap: 60px;
      row-gap: 20px;
      align-items: start;
    }

    /* TOP LEFT: NAME */
    .name {
      grid-column: 1;
      grid-row: 1;
      font-size: 34px;
      font-weight: 600;
    }

    /* TOP RIGHT: NAV */
    nav {
      grid-column: 2;
      grid-row: 1;
      justify-self: end;
    }

    nav a {
      margin-left: 15px;
      text-decoration: none;
      color: inherit;
    }

    nav a:hover {
      text-decoration: underline;
    }

    /* BOTTOM LEFT: PHOTO */
    .sidebar {
      grid-column: 1;
      grid-row: 2;
      display: flex;
      flex-direction: column;
      position: relative;
      top: 60px;
      align-items: center;
    }

    .sidebar img {
      width: 240px;
      height: 240px;
      object-fit: cover;
      border-radius: 50%;
    }

    /* BOTTOM RIGHT: CONTENT */
    .content {
      grid-column: 2;
      grid-row: 2;
      line-height: 1.6;
      max-width: 650px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                   Roboto, Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      color: #555;
    }

    h1, h2, h3 {
      font-weight: 500;
      color: #333;
      margin-top: 20px;
      margin-bottom: 10px;
    }

    a {
      color: #0366d6;
      text-decoration: none;
    }
    
    a:hover {
      text-decoration: underline;
    }

    .social-links {
      margin-top: 15px;
    }
    
    .social-links a {
      margin-right: 12px;
      font-size: 18px;
      color: #555;
      text-decoration: none;
      text-align: center;
    }
    
    .social-links a:hover {
      color: #000;
    }
    
  </style>
</head>

<body>

<div class="wrapper">

  <div class="name">
    {{ site.title }}
  </div>

  <nav>
    <a href="/">Home</a>
    <a href="/research.html">Research</a>
    <a href="/art.html">Art</a>
  </nav>

  <div class="sidebar">
    <img src="/assets/profile.jpg" alt="profile">

    <div class="social-links">
    <a href="https://www.linkedin.com/in/carina-shiau-5aa0bb276/" target="_blank">
      <i class="fab fa-linkedin"></i>
    </a>
  
    <a href="https://scholar.google.com/citations?hl=en&user=ucq6bocAAAAJ&view_op=list_works&sortby=pubdate" target="_blank">
      <i class="fas fa-graduation-cap"></i>
    </a>
  
    <a href="mailto:carina_shiau@hms.harvard.edu">
      <i class="fas fa-envelope"></i>
    </a>
      
  </div>
  </div>

  <div class="content">
    {{ content }}
  </div>

</div>

</body>
</html>
