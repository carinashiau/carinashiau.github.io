<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ page.title }}</title>

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  <style>
    .wrapper {
      max-width: 900px;
      margin: 0 auto;
      padding: 50px 20px;
    }

    .sidebar {
      text-align: center;
      margin-bottom: 25px;
    }

    .sidebar img {
      width: 280px;   /* increase size here */
      max-width: 100%;
      border-radius: 8px;
    }

    .main {
      flex: 1;
    }

    .name {
      font-size: 32px;
      font-weight: 600;
      margin-bottom: 20px;
      text-align: center;
    }

    nav {
      text-align: right;
      margin-bottom: 30px;
    }

    nav a {
      margin-left: 15px;
      text-decoration: none;
      color: inherit;
    }
  </style>
</head>

<body>

<div class="wrapper">

  <div class="sidebar">
    <img src="/assets/profile.jpg" alt="profile">
  </div>

  <div class="main">

    <div class="name">
      {{ site.title }}
    </div>

    <div class="sidebar">
      <img src="/assets/profile.jpg" alt="profile">
    </div>

    <nav>
      <a href="/">About</a> |
      <a href="/research.html">Research</a> |
      <a href="/art.html">Art</a>
    </nav>

    {{ content }}

  </div>

</div>

</body>
</html>
