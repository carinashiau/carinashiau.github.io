<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ page.title }}</title>

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  <style>
    .wrapper {
      max-width: 1000px;
      margin: 0 auto;
      padding: 60px 30px;
    
      display: grid;
      grid-template-columns: 220px 1fr;
      grid-template-rows: auto 1fr;
      column-gap: 60px;
      row-gap: 20px;
      align-items: start;
    }

    .name {
      grid-column: 1;
      grid-row: 1;
      font-size: 34px;
      font-weight: 600;
      margin: 0;
    }

    nav {
      grid-column: 2;
      grid-row: 1;
      justify-self: end;
      margin: 0;
    }

    nav a {
      margin-left: 15px;
      text-decoration: none;
      color: inherit;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .content {
      grid-column: 1 / span 2;
      grid-row: 2;
      line-height: 1.6;
    }

    .content h3 {
      color: #888;
      font-weight: 500;
      margin-top: 30px;
      margin-bottom: 10px;
    }

    .content h2 {
      margin-top: 60px;
      margin-bottom: 12px;
    }
    
    /* Remove space if it's the first element */
    .content h2:first-of-type {
      margin-top: 20px;
      margin-bottom: 0px;
    }

    .subtle {
      font-size: 14px;
      color: #888;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                   Roboto, Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      color: #555;
    }

    h1, h2, h3 {
      font-weight: 500;
      color: #333;
      margin-top: 20px;
      margin-bottom: 10px;
    }

    a {
      color: #0366d6;
      text-decoration: none;
    }
    
    a:hover {
      text-decoration: underline;
    }
    
  </style>
</head>

<body>

<div class="wrapper">

  <div class="name">
    {{ site.title }}
  </div>

  <nav>
    <a href="/">Home</a>
    <a href="/research.html">Research</a>
    <a href="/art.html">Art</a>
  </nav>

  <div class="content">
    {{ content }}
  </div>

</div>

</body>
</html>
